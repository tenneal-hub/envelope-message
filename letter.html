<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Thank You Letter</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #f5f5f5;
    font-family: Priestacy, Priestacy;
    overflow: hidden;
  }

  .scene {
    position: relative;
    width: 300px;
    height: 200px;
    cursor: pointer;
  }

  /* Envelope */
  .envelope {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    border: 2px solid #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
    overflow: hidden;
  }

  .text {
    font-family: cursive;
    font-size: 28px;
  }

  /* Flap */
  .flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    clip-path: polygon(0 0, 50% 50%, 100% 0);
    border-bottom: 2px solid black;
    transform-origin: top;
    transition: transform 0.8s ease;
    z-index: 3;
  }

  /* Letter */
  .letter {
    position: absolute;
    width: 260px;
    height: 160px;
    background: white;
    border: 2px solid black;
    top: 20px;
    left: 20px;
    transform: translateY(100px) scale(0.5);
    opacity: 0;
    transition: all 1s ease;
    z-index: 1;
    padding: 15px;
    box-sizing: border-box;
  }

  /* Open state */
  .open .flap {
    transform: rotateX(180deg);
  }

  .open .letter {
    transform: translateY(-120px) scale(1.5);
    opacity: 1;
    z-index: 5;
  }
</style>
</head>
<body>

<div class="scene" onclick="openEnvelope(this)">
  <div class="envelope">
    <div class="text">thank you</div>
    <div class="flap"></div>
  </div>

  <div class="letter">
    <!-- ✏️ EDIT THIS TEXT (sender only) -->
    <p>
      Thank you so much for everything you’ve done.<br><br>
      I truly appreciate your support and kindness.
    </p>
  </div>
</div>

<script>
  function openEnvelope(el) {
    el.classList.add("open");
  }
</script>

</body>
</html>
